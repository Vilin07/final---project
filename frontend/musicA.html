<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Down Playlist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b0505;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgb(11, 9, 9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: auto;
        }
        h1 {
            color: #f7f3f3;
        }
        iframe {
            width: 100%;
            height: 380px;
            border-radius: 12px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calm Down with Music</h1>
        <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DWSVO64ma1pNY" 
                frameborder="0" 
                allowtransparency="true" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
        </iframe>
    </div>
</body>
</html>
